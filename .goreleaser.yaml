version: 2

project_name: fusemomo-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: fusemomo-cli
    main: .
    binary: fusemomo-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - "386"
    ignore:
      - goos: darwin
        goarch: "386"
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.Commit}}
      - -X main.BuiltAt={{.Date}}

archives:
  - id: fusemomo-cli-archive
    name_template: "fusemomo-cli_{{.Version}}_{{.Os}}_{{.Arch}}"
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "fusemomo-cli_{{.Version}}_checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"